<!-- https://github.com/gohai/p5.webserial -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <script src="https://unpkg.com/@gohai/p5.webserial@^1/libraries/p5.webserial.js"></script>
</head>

<body>

    <script>
        let port;
        let connectBtn;
        let sendBtn;
        let baudRate = 115200;
        let ledOn = false;
        let currentLEDState = "OFF";
        let currentValue = "";
    
        function setup() {
            createCanvas(400, 400);

            port = createSerial();
            connectBtn = createButton("Connect to Adafruit");
            connectBtn.mousePressed(connectBtnClick);

            // in setup, we can open ports we have used previously
            // without user interaction
            let usedPorts = usedSerialPorts();
            if (usedPorts.length > 0) {
                port.open(usedPorts[0], baudRate);
                connectBtn.html("Disconnect");
                //connectBtn.hide();
            }

            sendBtn = createButton("Turn LED On");
            sendBtn.mousePressed(sendBtnClick);
        }

        function draw() {
            background(220);
            fill(0)
            text(currentLEDState, 10, 20);

            //response
            let str = port.readUntil("\n");
            if (str.length > 0) {     
                currentValue = str;
                console.log(currentValue);
            }
            fill(0);
            text("Response: " + currentValue, 10, 40);
        }

        function connectBtnClick() {
            if (connectBtn.html() != "Disconnect") {
                port.open("Adafruit", baudRate);
                connectBtn.html("Disconnect");
                //connectBtn.hide();
            } else {
                port.close();
                connectBtn.html("Connect to Board");
            }
        }

        function sendBtnClick() {
            // Toggle the LED state and send the corresponding command
            ledOn = !ledOn;
            if (ledOn) {
                port.println("LED_ON");
                sendBtn.html("Turn LED Off");
                currentLEDState = "ON";
            } else {
                port.println("LED_OFF");
                sendBtn.html("Turn LED On");
                currentLEDState = "OFF";
            }
        }
    </script>

</body>

</html>
